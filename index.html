<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>T cubed</title>
<style>
body { margin: 0; background: black; color: white; font-family: sans-serif; }
canvas { width: 100vw; height: 100vh; display: block; }
</style>
</head>

<body>
<canvas id="unity"></canvas>
<div id="status" style="position:absolute;top:10px;left:10px;z-index:10"></div>

<script src="https://cdn.jsdelivr.net/npm/brotli-wasm@3.0.0/index.min.js"></script>

<script>
const status = (t) => document.getElementById("status").innerText = t;

const files = [
  "tungtung.data.unityweb.br",
  "tungtung.wasm.code.unityweb.br",
  "tungtung.wasm.framework.unityweb.br"
];

async function fetchAndDecompress(url) {
  status("Loading " + url);

  const res = await fetch(url);
  const buf = new Uint8Array(await res.arrayBuffer());

  const decompressed = BrotliDecode(buf);

  return new Blob([decompressed]);
}

function BrotliDecode(input) {
  return BrotliDecodeWASM(input);
}

let wasmReady = false;

(async () => {

  status("Fetching + decompressing...");

  const blobs = await Promise.all(files.map(fetchAndDecompress));

  const urls = blobs.map(b => URL.createObjectURL(b));

  console.log("Blobs created:", urls);

  status("Blobs ready (Unity runtime still required)");

})();
</script>

</body>
</html>
