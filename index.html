<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>T cubed</title>
<style>
  body { margin: 0; overflow: hidden; background: black; }
  canvas { width: 100vw; height: 100vh; display: block; }
</style>
</head>

<body>
<canvas id="unity-canvas"></canvas>

<script>
const canvas = document.getElementById("unity-canvas");
const buildUrl = "";

async function loadArrayBuffer(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error("Failed: " + url);
  return await res.arrayBuffer();
} 
    
(async () => {

  console.log("Loading Unity assets...");

  const data = await loadArrayBuffer("tungtung.data.unityweb.br");
  const wasm = await loadArrayBuffer("tungtung.wasm.code.unityweb.br");
  const framework = await loadArrayBuffer("tungtung.wasm.framework.unityweb.br");

  window.Module = {
    canvas: canvas,
    wasmBinary: wasm,
    preRun: [],
    postRun: [],
    print: console.log,
    printErr: console.error,
  };

  const script = document.createElement("script");
  script.src = "tungtung.wasm.framework.unityweb.br";

  script.onerror = () => {
    console.error("Framework failed to execute. This means Unity runtime glue is missing.");
  };

  document.body.appendChild(script);

})();
</script>

</body>
</html>
